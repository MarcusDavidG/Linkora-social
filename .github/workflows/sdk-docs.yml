name: SDK Docs

on:
  push:
    branches: [main]
    paths:
      - "packages/sdk/src/**"
      - "packages/sdk/package.json"
      - "packages/sdk/tsconfig.json"
      - ".github/workflows/sdk-docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-docs:
    name: Build TypeDoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SDK docs
        run: pnpm --filter linkora-sdk docs

# deploy-docs job removed — GitHub Pages is not enabled on this repo.
# Re-add when https://github.com/Epta-Node/Linkora-social/settings/pages is configured.
